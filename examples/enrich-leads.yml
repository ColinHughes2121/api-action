# Example: Read a CSV of company domains, enrich each one via GoCreative AI,
# and commit the enriched CSV back to the repo. Wire this into a daily cron
# to keep your lead list fresh.

name: Enrich leads daily

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC daily
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read first domain from leads.csv
        id: read
        run: |
          DOMAIN=$(tail -n +2 leads.csv | head -n 1 | cut -d, -f1)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Enrich the company
        id: enrich
        uses: gocreativeai/api-action@v1
        with:
          endpoint: enrich/company
          args: '{"domain": "${{ steps.read.outputs.domain }}"}'
          api_key: ${{ secrets.GOCREATIVE_API_KEY }}
          output_file: ./enriched/${{ steps.read.outputs.domain }}.json

      - name: Commit enriched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add enriched/
          git diff --cached --quiet || git commit -m "chore: enrich ${{ steps.read.outputs.domain }}"
          git push
