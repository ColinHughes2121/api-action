# Example: When a new issue is opened, look up the reporter on GitHub
# and auto-comment a friendly profile-aware welcome. Showcases the free
# demo tier — no API key needed.

name: Triage new issues

on:
  issues:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Look up reporter
        id: lookup
        uses: gocreativeai/api-action@v1
        with:
          endpoint: github/user
          args: '{"username": "${{ github.event.issue.user.login }}"}'
          # no api_key → free demo tier (5/day per IP, fine for most repos)

      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const data = JSON.parse(`${{ steps.lookup.outputs.response }}`);
            const name = data.name || context.payload.issue.user.login;
            const company = data.company ? ` from ${data.company}` : '';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thanks for the report, ${name}${company}! A maintainer will take a look soon.`
            });
